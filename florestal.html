<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SGO-ETP · Monitoramento de Incêndios Florestais</title>
<style>
  :root{
    --navy:#0A2240; --navy2:#143257; --teal:#007B6E; --teal-d:#015d53;
    --bg:#eef1f5; --card:#ffffff; --line:#dfe5ec; --ink:#0A2240; --muted:#5b6b7b;
    --ok:#1f9d57; --okbg:#e6f6ec; --nc:#d63131; --ncbg:#fbe9e9; --warn:#c98a00; --warnbg:#fff5e0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:16px}
  header{background:var(--navy);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(10,34,64,.18)}
  header .mark{width:34px;height:34px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  header h1{font-size:15px;margin:0;font-weight:700}
  header small{display:block;font-weight:400;opacity:.75;font-size:11px}
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(10,34,64,.05)}
  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:4px 2px 10px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;font-weight:700}
  select,textarea,input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  textarea{min-height:70px;resize:vertical}
  .alertas{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:4px}
  .alertas button{border:2px solid var(--line);background:#fff;border-radius:10px;padding:12px 4px;font-size:12px;font-weight:800;color:var(--muted)}
  .alertas button.on{color:#fff;border-color:transparent}
  .toggle{display:flex;gap:6px}
  .toggle button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:11px;font-size:14px;font-weight:700;color:var(--muted)}
  .toggle button.on-ok{background:var(--ok);border-color:var(--ok);color:#fff}
  .toggle button.on-nc{background:var(--nc);border-color:var(--nc);color:#fff}
  .check{padding:12px 0;border-bottom:1px solid var(--line)}
  .check:last-child{border-bottom:0}
  .check .lbl{font-size:14px;font-weight:600;margin-bottom:8px}
  .photo-btn{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--teal);color:var(--teal);background:#f3fbfa;border-radius:10px;padding:16px;font-weight:700;font-size:14px;width:100%;cursor:pointer;margin-bottom:8px}
  .photo-prev{border-radius:10px;width:100%;max-height:200px;object-fit:cover;margin-bottom:8px;display:block}
  .save{width:100%;background:var(--teal);color:#fff;border:0;border-radius:12px;padding:16px;font-size:16px;font-weight:800;box-shadow:0 4px 14px rgba(0,123,110,.35)}
  .save:disabled{opacity:.55;box-shadow:none}
  .lock-card{text-align:center}
  .lock-ic{font-size:40px}
  .success{text-align:center;padding:30px 16px}
  .success .ico{width:74px;height:74px;border-radius:50%;background:var(--okbg);color:var(--ok);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:40px}
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:s .8s linear infinite;margin:0 auto 12px}
  @keyframes s{to{transform:rotate(360deg)}}
  .alert{margin-top:10px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:600}
  .alert.warn{background:var(--warnbg);color:var(--warn)}
  .ghost{background:#fff;border:1.5px solid var(--teal);color:var(--teal);border-radius:12px;padding:14px;font-size:15px;font-weight:700;width:100%;margin-top:10px}
  .intro{font-size:13px;color:var(--muted);margin:0 0 10px;line-height:1.4}
  @media(min-width:700px){ .wrap{max-width:640px;padding:24px} }
</style>
</head>
<body>
<header>
  <div class="mark">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 2c1 3-1 4-1 6 0 1 1 2 2 2 2 0 3-2 3-2 1 2 2 4 2 6a6 6 0 11-12 0c0-3 2-5 3-7 1 2 2 2 3 1 1-2-1-3-1-6z"/></svg>
  </div>
  <div><h1>Monitoramento de Incêndios Florestais<small>SGO-ETP · Emergência Terminal Parauapebas</small></h1></div>
</header>
<div class="wrap" id="app">
  <div class="loading"><div class="spin"></div>Carregando…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://wcyftjpsbifyvuqzxmbs.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjeWZ0anBzYmlmeXZ1cXp4bWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODUyNzksImV4cCI6MjA5NTY2MTI3OX0.Dcwuq7_Y85PIrbciAj-8-YRbfmMg9QxBkR9esljqMbM";
const BUCKET = "inspecao-fotos";
const PIN_EQUIPE = "1234";

let sb=null, DEMO=false;
try { if (window.supabase) { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } else { DEMO=true; } }
catch(e){ DEMO=true; }

let unlocked=false; try{ unlocked = sessionStorage.getItem('sgo_unlock_flor')==='1'; }catch(e){}
const app=document.getElementById('app');
const state={ efetivo:[], fotos:[], nivel:'verde', vegetacao:'', focos:null, aceiros:null };

const NIVEIS=[['verde','VERDE','#1f9d57'],['amarelo','AMARELO','#c98a00'],['laranja','LARANJA','#e2742a'],['vermelho','VERMELHO','#d63131']];
const ALERTA_DESC={verde:'Operação normal — vigilância de rotina.',amarelo:'Risco elevado — ronda reforçada.',laranja:'Risco alto — prontidão ampliada.',vermelho:'Risco crítico — prontidão máxima.'};

function $(id){return document.getElementById(id);}
function lastInspetor(){ try{return sessionStorage.getItem('sgo_inspetor')||'';}catch(e){return '';} }
function bannerDemo(){ return DEMO ? '<div class="alert warn">🔌 Modo demonstração — sem conexão. Publique no GitHub para usar os dados reais.</div>' : ''; }

async function init(){
  if(!sb){ DEMO=true; render(); return; }
  try{ const {data,error}=await sb.from('efetivo').select('id,nome').eq('status','ativo').order('nome'); if(error)throw error; state.efetivo=data||[]; }
  catch(e){ DEMO=true; state.efetivo=[{id:'d1',nome:'Brigadista (demo)'}]; }
  render();
}

function render(){
  app.innerHTML = `${bannerDemo()}
  <div class="card">
    <p class="intro">Check diário de vigilância de focos de incêndio florestal no entorno do Terminal Parauapebas, conforme a ronda do turno.</p>
    ${unlocked ? '' : lockHTML()}
  </div>
  ${unlocked ? formHTML() : ''}`;
}

function lockHTML(){
  return `<div class="lock-card">
    <div class="lock-ic">🔒</div>
    <h2 style="margin:6px 0 4px;font-size:17px">Acesso da equipe</h2>
    <p style="color:var(--muted);font-size:14px;margin:0 0 14px">Informe o código de acesso da equipe de bombeiros para registrar o monitoramento.</p>
    <input id="pin" type="password" inputmode="numeric" placeholder="Código da equipe" style="text-align:center;letter-spacing:4px;font-size:18px" onkeydown="if(event.key==='Enter')desbloquear()">
    <button class="save" style="margin-top:12px" onclick="desbloquear()">Desbloquear</button>
  </div>`;
}
function desbloquear(){
  const v=($('pin').value||'').trim();
  if(v===PIN_EQUIPE){ unlocked=true; try{sessionStorage.setItem('sgo_unlock_flor','1');}catch(e){} render(); }
  else { alert('Código incorreto.'); }
}

function formHTML(){
  return `
  <div class="card">
    <h2 class="sec">Nível de alerta do dia</h2>
    <div class="alertas" id="alertas">
      ${NIVEIS.map(n=>`<button data-n="${n[0]}" onclick="setNivel('${n[0]}')" class="${state.nivel===n[0]?'on':''}" style="${state.nivel===n[0]?('background:'+n[2]):''}">${n[1]}</button>`).join('')}
    </div>
    <div class="alert warn" id="alertaDesc" style="background:#f1f4f8;color:var(--muted)">${ALERTA_DESC[state.nivel]}</div>
  </div>

  <div class="card">
    <h2 class="sec">Vigilância — conforme a ronda</h2>
    <div class="check">
      <div class="lbl">Focos de fumaça / calor avistados?</div>
      <div class="toggle">
        <button id="foc-nao" class="${state.focos===false?'on-ok':''}" onclick="setFocos(false)">NÃO</button>
        <button id="foc-sim" class="${state.focos===true?'on-nc':''}" onclick="setFocos(true)">SIM</button>
      </div>
    </div>
    <div class="check">
      <div class="lbl">Aceiros / faixas limpas mantidos?</div>
      <div class="toggle">
        <button id="ace-sim" class="${state.aceiros===true?'on-ok':''}" onclick="setAceiros(true)">SIM</button>
        <button id="ace-nao" class="${state.aceiros===false?'on-nc':''}" onclick="setAceiros(false)">NÃO</button>
      </div>
    </div>
    <div class="check">
      <div class="lbl">Condição da vegetação no entorno</div>
      <select id="vegetacao">
        <option value="">Selecione…</option>
        <option value="ok">Normal / úmida</option>
        <option value="atencao">Seca em pontos (atenção)</option>
        <option value="critico">Muito seca (crítico)</option>
      </select>
    </div>
  </div>

  <div class="card">
    <h2 class="sec">Responsável</h2>
    <select id="resp">
      <option value="">Selecione o responsável…</option>
      ${state.efetivo.map(f=>`<option value="${f.id}" ${f.id===lastInspetor()?'selected':''}>${f.nome}</option>`).join('')}
    </select>
  </div>

  <div class="card">
    <h2 class="sec">Fotos (1 a 2)</h2>
    <div id="prevs"></div>
    <label class="photo-btn" id="fotoBtn">📷 Adicionar foto
      <input type="file" accept="image/*" capture="environment" style="display:none" onchange="capturarFoto(this)">
    </label>
  </div>

  <div class="card">
    <h2 class="sec">Observações</h2>
    <textarea id="obs" placeholder="Anote qualquer detalhe da ronda (opcional)…"></textarea>
  </div>

  <button id="btnSalvar" class="save" onclick="salvar()">Salvar monitoramento</button>`;
}

function setNivel(n){ state.nivel=n; const a=$('alertas'); [...a.children].forEach(b=>{ const on=b.dataset.n===n; b.className=on?'on':''; b.style.background=on?(NIVEIS.find(x=>x[0]===n)[2]):''; }); $('alertaDesc').textContent=ALERTA_DESC[n]; }
function setFocos(v){ state.focos=v; $('foc-sim').className=v?'on-nc':''; $('foc-nao').className=v?'':'on-ok'; }
function setAceiros(v){ state.aceiros=v; $('ace-sim').className=v?'on-ok':''; $('ace-nao').className=v?'':'on-nc'; }

function capturarFoto(input){
  const file=input.files[0]; if(!file) return;
  if(state.fotos.length>=2){ alert('Máximo de 2 fotos.'); return; }
  const reader=new FileReader();
  reader.onload=ev=>{ const img=new Image(); img.onload=()=>{
    const max=1000, sc=Math.min(1,max/Math.max(img.width,img.height));
    const cv=document.createElement('canvas'); cv.width=img.width*sc; cv.height=img.height*sc;
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    cv.toBlob(b=>{ state.fotos.push(b); desenhaPrevs(); }, 'image/jpeg', 0.6);
  }; img.src=ev.target.result; };
  reader.readAsDataURL(file);
}
function desenhaPrevs(){
  $('prevs').innerHTML = state.fotos.map((b,i)=>`<img class="photo-prev" src="${URL.createObjectURL(b)}">`).join('');
  $('fotoBtn').style.display = state.fotos.length>=2?'none':'flex';
}

/* GPS (mesma lógica das inspeções) */
function obterLocal(){
  return new Promise(res=>{
    if(!navigator.geolocation) return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),
      ()=>res(null), {enableHighAccuracy:true,timeout:10000,maximumAge:0});
  });
}

async function salvar(){
  const resp=$('resp').value;
  if(!resp){ alert('Selecione o responsável.'); return; }
  if(state.focos===null || state.aceiros===null){ alert('Responda os itens de vigilância (focos e aceiros).'); return; }
  state.vegetacao=$('vegetacao').value||null;
  const btn=$('btnSalvar'); btn.disabled=true; btn.textContent='Salvando…';
  try{ sessionStorage.setItem('sgo_inspetor', resp); }catch(e){}

  if(DEMO || !sb){ setTimeout(()=>telaSucesso(), 400); return; }
  try{
    let evidencias=[];
    for(const b of state.fotos){
      const nome=`florestal/${Date.now()}-${Math.random().toString(36).slice(2,7)}.jpg`;
      const {error:upErr}=await sb.storage.from(BUCKET).upload(nome,b,{contentType:'image/jpeg'});
      if(!upErr){ const {data:pub}=sb.storage.from(BUCKET).getPublicUrl(nome); evidencias.push(pub.publicUrl); }
    }
    const loc=await obterLocal(); let gps={};
    if(loc){ gps={latitude:loc.lat,longitude:loc.lng,gps_precisao:loc.acc}; }
    const {error}=await sb.from('monitoramento_florestal').insert({
      responsavel_id:resp, nivel_alerta:state.nivel, vegetacao:state.vegetacao,
      focos_fumaca:state.focos, aceiros_ok:state.aceiros,
      observacao:$('obs').value||null, evidencias, ...gps
    });
    if(error) throw error;
    telaSucesso();
  }catch(err){ btn.disabled=false; btn.textContent='Salvar monitoramento'; alert('Erro ao salvar: '+(err.message||err)); }
}

function telaSucesso(){
  const n=NIVEIS.find(x=>x[0]===state.nivel);
  app.innerHTML=`<div class="card"><div class="success">
    <div class="ico">✓</div>
    <h2>Monitoramento registrado</h2>
    <p style="color:var(--muted);margin:6px 0 2px">Nível de alerta: <b style="color:${n[2]}">${n[1]}</b></p>
    ${state.focos?'<p style="color:var(--nc);font-weight:700;margin:4px 0">⚠ Focos avistados — acionar tratativa</p>':''}
    <button class="save" style="margin-top:16px" onclick="location.reload()">Novo monitoramento</button>
  </div></div>`;
}

init();
</script>
</body>
</html>
