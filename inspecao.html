<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SGO-ETP · Inspeção de Extintores</title>
<style>
  :root{
    --navy:#0A2240; --navy2:#143257; --teal:#007B6E; --teal-d:#015d53;
    --bg:#eef1f5; --card:#ffffff; --line:#dfe5ec; --ink:#0A2240; --muted:#5b6b7b;
    --ok:#1f9d57; --okbg:#e6f6ec; --nc:#d63131; --ncbg:#fbe9e9; --warn:#c98a00; --warnbg:#fff5e0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:16px}
  header{background:var(--navy);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(10,34,64,.18)}
  header .mark{width:34px;height:34px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  header h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.2px}
  header small{display:block;font-weight:400;opacity:.75;font-size:11px}
  .tabs{display:flex;background:var(--navy2)}
  .tabs button{flex:1;background:none;border:0;color:#cdd7e4;padding:11px 0;font-size:13px;font-weight:600;border-bottom:3px solid transparent}
  .tabs button.active{color:#fff;border-bottom-color:var(--teal)}
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(10,34,64,.05)}
  .id-card{border-left:6px solid var(--teal);background:linear-gradient(180deg,#fff,#fafcfe)}
  .id-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .codigo{font-size:22px;font-weight:800;letter-spacing:.5px}
  .badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--navy);color:#fff;white-space:nowrap}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:2px;font-weight:700}
  .field span{font-size:15px;font-weight:600}
  .alert{margin-top:12px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:600;display:flex;gap:8px;align-items:center}
  .alert.ok{background:var(--okbg);color:var(--ok)}
  .alert.warn{background:var(--warnbg);color:var(--warn)}
  .alert.nc{background:var(--ncbg);color:var(--nc)}
  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:4px 2px 10px}
  .check{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);gap:10px}
  .check:last-child{border-bottom:0}
  .check .lbl{font-size:14px;font-weight:600;flex:1;line-height:1.25}
  .toggle{display:flex;gap:6px;flex:0 0 auto}
  .toggle button{border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--muted);min-width:48px}
  .toggle button.on-ok{background:var(--ok);border-color:var(--ok);color:#fff}
  .toggle button.on-nc{background:var(--nc);border-color:var(--nc);color:#fff}
  select,textarea,input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  textarea{min-height:70px;resize:vertical}
  .photo-btn{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--teal);color:var(--teal);background:#f3fbfa;border-radius:10px;padding:16px;font-weight:700;font-size:14px;width:100%;cursor:pointer}
  .photo-prev{margin-top:10px;border-radius:10px;width:100%;max-height:230px;object-fit:cover;display:none}
  .save{width:100%;background:var(--teal);color:#fff;border:0;border-radius:12px;padding:16px;font-size:16px;font-weight:800;letter-spacing:.3px;box-shadow:0 4px 14px rgba(0,123,110,.35)}
  .save:disabled{opacity:.55;box-shadow:none}
  .save.busy{background:var(--teal-d)}
  .list-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff;cursor:pointer}
  .list-item .c{font-weight:800;font-size:16px}
  .list-item .m{font-size:12px;color:var(--muted);margin-top:2px}
  .chev{color:var(--teal);font-size:20px;font-weight:800}
  .qr-item{text-align:center;padding:16px;border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:#fff}
  .qr-item canvas{max-width:200px;height:auto}
  .qr-item .c{font-weight:800;margin-top:8px}
  .qr-item .m{font-size:12px;color:var(--muted)}
  .success{text-align:center;padding:30px 16px}
  .success .ico{width:74px;height:74px;border-radius:50%;background:var(--okbg);color:var(--ok);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:40px}
  .success h2{margin:0 0 6px}
  .ghost{background:#fff;border:1.5px solid var(--teal);color:var(--teal);border-radius:12px;padding:14px;font-size:15px;font-weight:700;width:100%;margin-top:10px}
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:s .8s linear infinite;margin:0 auto 12px}
  @keyframes s{to{transform:rotate(360deg)}}
  @media print{header,.tabs,.no-print{display:none}.qr-item{page-break-inside:avoid}}
</style>
</head>
<body>
<header>
  <div class="mark">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2c1 3-1 4-1 6 0 1 1 2 2 2 2 0 3-2 3-2 1 2 2 4 2 6a6 6 0 11-12 0c0-3 2-5 3-7 1 2 2 2 3 1 1-2-1-3-1-6z" fill="#fff"/></svg>
  </div>
  <div><h1>Inspeção de Extintores<small>SGO-ETP · Emergência Terminal Parauapebas</small></h1></div>
</header>

<div class="tabs no-print">
  <button id="tab-insp" class="active" onclick="setView('inspecao')">Inspecionar</button>
  <button id="tab-qr" onclick="setView('qr')">Gerar QR Codes</button>
</div>

<div class="wrap" id="app">
  <div class="loading"><div class="spin"></div>Carregando…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
/* ===== CONFIG SGO-ETP ===== */
const SUPABASE_URL = "https://wcyftjpsbifyvuqzxmbs.supabase.co";
const SUPABASE_KEY = "sb_publishable_vHGgWaZedn7WvOX6YI8Jag_TZRqQAdS";
const BUCKET = "inspecao-fotos";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* Itens do checklist (baseados no cartão físico + boa prática IT/NBR) */
const ITENS = [
  "Lacre / trava de segurança íntegro",
  "Manômetro na faixa verde (pressão OK)",
  "Mangueira e difusor sem danos",
  "Sinalização de piso/parede visível",
  "Acesso desobstruído",
  "Cilindro sem corrosão ou avaria",
  "Rótulo legível e validade vigente",
  "Suporte / fixação adequada"
];

const app = document.getElementById('app');
let state = { extintor:null, respostas:{}, foto:null, efetivo:[] };

/* ---------- Helpers ---------- */
function fmtData(d){ if(!d) return '—'; const [a,m,dia]=d.split('-'); return `${dia}/${m}/${a}`; }
function diasAte(d){ if(!d) return null; return Math.ceil((new Date(d)-new Date())/86400000); }
function getParam(k){ return new URLSearchParams(location.search).get(k); }

/* ---------- Router ---------- */
async function init(){
  await carregarEfetivo();
  const cod = getParam('ext');
  if(cod){ await abrirExtintor(cod); }
  else { await listaExtintores(); }
}
function setView(v){
  document.getElementById('tab-insp').classList.toggle('active', v==='inspecao');
  document.getElementById('tab-qr').classList.toggle('active', v==='qr');
  if(v==='qr') telaQR();
  else { const cod=getParam('ext'); cod?abrirExtintor(cod):listaExtintores(); }
}

async function carregarEfetivo(){
  const { data } = await sb.from('efetivo').select('id,nome').eq('status','ativo').order('nome');
  state.efetivo = data || [];
}

/* ---------- Lista / seleção ---------- */
async function listaExtintores(){
  app.innerHTML = '<div class="loading"><div class="spin"></div>Buscando extintores…</div>';
  const { data, error } = await sb.from('extintores').select('*').eq('status','ativo').order('codigo');
  if(error){ app.innerHTML = erro(error.message); return; }
  if(!data.length){ app.innerHTML = '<div class="card">Nenhum extintor cadastrado ainda.</div>'; return; }
  app.innerHTML = '<h2 class="sec">Selecione o extintor</h2>' + data.map(e=>{
    const dias = diasAte(e.validade_carga);
    const aviso = dias!==null && dias<0 ? ' · ⚠ carga vencida' : (dias!==null && dias<30 ? ` · vence em ${dias}d` : '');
    return `<div class="list-item" onclick="abrirExtintor('${e.codigo}')">
      <div><div class="c">${e.codigo}</div><div class="m">${e.tipo} · ${e.local||'—'}${aviso}</div></div>
      <div class="chev">›</div></div>`;
  }).join('');
}

/* ---------- Tela de inspeção ---------- */
async function abrirExtintor(codigo){
  app.innerHTML = '<div class="loading"><div class="spin"></div>Carregando extintor…</div>';
  const { data, error } = await sb.from('extintores').select('*').eq('codigo',codigo).maybeSingle();
  if(error || !data){ app.innerHTML = erro(`Extintor "${codigo}" não encontrado.`); return; }
  state.extintor = data; state.respostas = {}; state.foto = null;
  renderInspecao();
}

function renderInspecao(){
  const e = state.extintor;
  const dias = diasAte(e.validade_carga);
  let alerta = '<div class="alert ok">✓ Carga dentro da validade</div>';
  if(dias!==null && dias<0) alerta = `<div class="alert nc">⚠ Carga VENCIDA em ${fmtData(e.validade_carga)}</div>`;
  else if(dias!==null && dias<30) alerta = `<div class="alert warn">⏱ Carga vence em ${dias} dia(s) — ${fmtData(e.validade_carga)}</div>`;

  app.innerHTML = `
    <div class="card id-card">
      <div class="id-top"><div class="codigo">${e.codigo}</div><div class="badge">${e.tipo} · ${e.capacidade||''}</div></div>
      <div class="grid2">
        <div class="field"><label>Local</label><span>${e.local||'—'}</span></div>
        <div class="field"><label>Área</label><span>${e.area||'—'}</span></div>
        <div class="field"><label>Validade carga</label><span>${fmtData(e.validade_carga)}</span></div>
        <div class="field"><label>Teste hidrostático</label><span>${fmtData(e.validade_hidrostatico)}</span></div>
      </div>
      ${alerta}
    </div>

    <div class="card">
      <h2 class="sec">Checklist de inspeção</h2>
      ${ITENS.map((it,i)=>`
        <div class="check">
          <div class="lbl">${it}</div>
          <div class="toggle">
            <button id="ok${i}" onclick="resp(${i},true)">OK</button>
            <button id="nc${i}" onclick="resp(${i},false)">NC</button>
          </div>
        </div>`).join('')}
    </div>

    <div class="card">
      <h2 class="sec">Inspetor</h2>
      <select id="inspetor">
        <option value="">Selecione o responsável…</option>
        ${state.efetivo.map(f=>`<option value="${f.id}">${f.nome}</option>`).join('')}
      </select>
    </div>

    <div class="card">
      <h2 class="sec">Foto (evidência)</h2>
      <label class="photo-btn">📷 Tirar foto do extintor
        <input type="file" accept="image/*" capture="environment" style="display:none" onchange="capturarFoto(this)">
      </label>
      <img id="prev" class="photo-prev">
    </div>

    <div class="card">
      <h2 class="sec">Observações</h2>
      <textarea id="obs" placeholder="Anote qualquer detalhe (opcional)…"></textarea>
    </div>

    <button id="btnSalvar" class="save" onclick="salvar()">Salvar inspeção</button>
    ${getParam('ext')?'':'<button class="ghost no-print" onclick="listaExtintores()">‹ Voltar à lista</button>'}
  `;
}

function resp(i,ok){
  state.respostas[i]=ok;
  document.getElementById('ok'+i).className = ok?'on-ok':'';
  document.getElementById('nc'+i).className = ok?'':'on-nc';
}

/* Comprime a foto antes de enviar (mantém leve) */
function capturarFoto(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      const max=1000, sc=Math.min(1,max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=img.width*sc; cv.height=img.height*sc;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(b=>{ state.foto=b; const p=document.getElementById('prev'); p.src=URL.createObjectURL(b); p.style.display='block'; }, 'image/jpeg', 0.6);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- Salvar ---------- */
async function salvar(){
  const total=ITENS.length, respondidos=Object.keys(state.respostas).length;
  if(respondidos<total){ alert(`Marque todos os itens (${respondidos}/${total}).`); return; }
  const inspetor=document.getElementById('inspetor').value;
  if(!inspetor){ alert('Selecione o inspetor responsável.'); return; }

  const btn=document.getElementById('btnSalvar');
  btn.disabled=true; btn.classList.add('busy'); btn.textContent='Salvando…';

  try{
    // 1) upload da foto (se houver)
    let evidencias=[];
    if(state.foto){
      const nome=`${state.extintor.codigo}/${Date.now()}.jpg`;
      const { error:upErr } = await sb.storage.from(BUCKET).upload(nome, state.foto, {contentType:'image/jpeg'});
      if(!upErr){ const { data:pub } = sb.storage.from(BUCKET).getPublicUrl(nome); evidencias=[pub.publicUrl]; }
    }
    // 2) monta checklist e conformidade
    const checklist=ITENS.map((it,i)=>({item:it, conforme:state.respostas[i]}));
    const conformes=checklist.filter(c=>c.conforme).length;
    const pct=Math.round(conformes/total*100);
    const condicao = pct===100 ? 'conforme' : 'nao_conforme';

    // 3) insere na tabela inspecoes existente
    const { error:insErr } = await sb.from('inspecoes').insert({
      tipo:'extintor', area:state.extintor.area, extintor_id:state.extintor.id,
      responsavel_id:inspetor, checklist, conformidade_pct:pct, condicao,
      observacoes:document.getElementById('obs').value||null, evidencias
    });
    if(insErr) throw insErr;

    // 4) atualiza última inspeção do extintor
    await sb.from('extintores').update({ultima_inspecao:new Date().toISOString()}).eq('id',state.extintor.id);

    telaSucesso(pct, condicao);
  }catch(err){
    btn.disabled=false; btn.classList.remove('busy'); btn.textContent='Salvar inspeção';
    alert('Erro ao salvar: '+(err.message||err));
  }
}

function telaSucesso(pct, condicao){
  const ok = condicao==='conforme';
  app.innerHTML = `<div class="card"><div class="success">
    <div class="ico" style="${ok?'':'background:var(--ncbg);color:var(--nc)'}">${ok?'✓':'!'}</div>
    <h2>Inspeção registrada</h2>
    <p style="color:var(--muted);margin:0 0 4px">${state.extintor.codigo} · conformidade ${pct}%</p>
    <p style="font-weight:700;color:${ok?'var(--ok)':'var(--nc)'}">${ok?'Conforme':'Não conforme — abrir tratativa'}</p>
    <button class="save" style="margin-top:16px" onclick="${getParam('ext')?'location.reload()':'listaExtintores()'}">${getParam('ext')?'Nova inspeção':'‹ Voltar à lista'}</button>
  </div></div>`;
}

/* ---------- Aba QR Codes ---------- */
async function telaQR(){
  app.innerHTML='<div class="loading"><div class="spin"></div>Gerando QR Codes…</div>';
  const { data } = await sb.from('extintores').select('codigo,tipo,local').eq('status','ativo').order('codigo');
  const base = location.href.split('?')[0];
  app.innerHTML = '<h2 class="sec no-print">Imprima e cole em cada extintor</h2>' +
    (data||[]).map(e=>`<div class="qr-item"><canvas id="q-${e.codigo}"></canvas>
      <div class="c">${e.codigo}</div><div class="m">${e.tipo} · ${e.local||''}</div></div>`).join('') +
    '<button class="ghost no-print" onclick="window.print()">🖨 Imprimir todos</button>';
  (data||[]).forEach(e=>{
    QRCode.toCanvas(document.getElementById('q-'+e.codigo), `${base}?ext=${e.codigo}`, {width:200,margin:1});
  });
}

function erro(msg){ return `<div class="card"><div class="alert nc">⚠ ${msg}</div></div>`; }

init();
</script>
</body>
</html>
