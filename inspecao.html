/* Cliente Supabase próprio via fetch (sem CDN externo — funciona em rede corporativa) */
function makeClient(url, key){
  const H = { apikey:key, Authorization:'Bearer '+key };
  const errOf = async r => r.ok ? null : (await r.json().catch(()=>({message:'HTTP '+r.status})));
  function query(table){
    const st={select:'*',filters:[],order:'',limit:'',single:false};
    const run=async()=>{
      let q=`${url}/rest/v1/${table}?select=${encodeURIComponent(st.select)}`;
      st.filters.forEach(f=>q+='&'+f); q+=st.order+st.limit;
      try{
        const r=await fetch(q,{headers:H});
        let data=await r.json();
        if(!r.ok) return {data:null,error:data};
        if(st.single) data=Array.isArray(data)?(data[0]||null):data;
        return {data,error:null};
      }catch(e){ return {data:null,error:e}; }
    };
    const api={
      select(c){ st.select=c||'*'; return api; },
      eq(c,v){ st.filters.push(`${c}=eq.${encodeURIComponent(v)}`); return api; },
      order(c,o){ st.order=`&order=${c}.${(o&&o.ascending===false)?'desc':'asc'}`; return api; },
      limit(n){ st.limit=`&limit=${n}`; return api; },
      maybeSingle(){ st.single=true; return run(); },
      then(res,rej){ return run().then(res,rej); }
    };
    return api;
  }
  function from(table){
    return {
      select(c){ return query(table).select(c); },
      insert(obj){ return fetch(`${url}/rest/v1/${table}`,{method:'POST',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(obj)}).then(async r=>({error:await errOf(r)})); },
      update(obj){ return { eq:(c,v)=>fetch(`${url}/rest/v1/${table}?${c}=eq.${encodeURIComponent(v)}`,{method:'PATCH',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(obj)}).then(async r=>({error:await errOf(r)})) }; }
    };
  }
  const storage={ from(bucket){ return {
    upload(path,file,opts){ return fetch(`${url}/storage/v1/object/${bucket}/${path}`,{method:'POST',headers:{...H,'Content-Type':(opts&&opts.contentType)||'application/octet-stream'},body:file}).then(async r=>({error:await errOf(r)})); },
    getPublicUrl(path){ return {data:{publicUrl:`${url}/storage/v1/object/public/${bucket}/${path}`}}; }
  };}};
  return { from, storage };
}

/* ---------- Lista / seleção ---------- */
function ordenarPorNumero(arr){
  return [...arr].sort((a,b)=>{
    const na=parseInt((a.codigo||'').replace(/\D/g,''),10);
    const nb=parseInt((b.codigo||'').replace(/\D/g,''),10);
    if(isNaN(na)||isNaN(nb)) return (a.codigo||'').localeCompare(b.codigo||'');
    return na-nb;
  });
}

/* ---------- Tela de inspeção ---------- */
async function abrirExtintor(codigo){

  else{
    try{ const r = await sb.from('extintores').select('*').eq('codigo',codigo).maybeSingle(); if(r.error) throw r.error; data=r.data; }
    catch(e){ DEMO=true; data=MOCK_EXT.find(x=>x.codigo===codigo)||MOCK_EXT[0]; }
  }
  if(!data){ app.innerHTML = erro(`Extintor "${codigo}" não encontrado.`); return; }
  state.extintor = data; state.respostas = {}; state.obsItem = {}; state.foto = null; state.ultimaInsp = null; retirado = false;
  if(sb && !DEMO){
    try{
      const r = await sb.from('inspecoes').select('created_at,condicao').eq('extintor_id',data.id).order('created_at',{ascending:false}).limit(1).maybeSingle();

    }catch(e){}
  }
  renderInspecao();
}

/* Comprime a foto antes de enviar (mantém leve) */
function capturarFoto(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      const max=1000, sc=Math.min(1,max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=img.width*sc; cv.height=img.height*sc;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(b=>{ state.foto=b; const p=document.getElementById('prev'); p.src=URL.createObjectURL(b); p.style.display='block'; }, 'image/jpeg', 0.6);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ===== Caminho B: verificação de presença por GPS ===== */
let _foraLocal=false;
const RAIO_TOLERANCIA = 60; // metros de tolerância (GPS oscila em área industrial)
function obterLocal(){
  return new Promise(res=>{
    if(!navigator.geolocation) return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),
      ()=>res(null),
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  });
}
function distanciaMetros(la1,lo1,la2,lo2){
  const R=6371000, rad=x=>x*Math.PI/180;
  const dla=rad(la2-la1), dlo=rad(lo2-lo1);
  const a=Math.sin(dla/2)**2+Math.cos(rad(la1))*Math.cos(rad(la2))*Math.sin(dlo/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
/* ---------- Salvar ---------- */
async function salvar(){
  const total=ITENS.length, respondidos=Object.keys(state.respostas).length;
  if(respondidos<total){ alert(`Marque todos os itens (${respondidos}/${total}).`); return; }
  const inspetor=document.getElementById('inspetor').value;
  if(!inspetor){ alert('Selecione o inspetor responsável.'); return; }
  try{ sessionStorage.setItem('sgo_inspetor', inspetor); }catch(e){}

  const btn=document.getElementById('btnSalvar');
  btn.disabled=true; btn.classList.add('busy'); btn.textContent='Salvando…';

  // monta checklist e conformidade (OK/NC/NA — NA não conta)
  const checklist=ITENS.map((it,i)=>({item:it, situacao:state.respostas[i], obs:(state.obsItem[i]||'').trim()||null}));
  const nOk=checklist.filter(c=>c.situacao==='ok').length;
  const nNc=checklist.filter(c=>c.situacao==='nc').length;
  const base=nOk+nNc;
  const pct = base ? Math.round(nOk/base*100) : 100;
  const condicao = nNc>0 ? 'nao_conforme' : 'conforme';
  checklist.push({item:'Extintor foi retirado?', situacao: retirado?'sim':'nao'});
  const _lAnt=(document.getElementById('lacreAnt')||{}).value, _lNov=(document.getElementById('lacreNova')||{}).value;
  if(_lAnt&&_lNov) checklist.push({item:'Cor do lacre (anterior → atual)', situacao:`${_lAnt} → ${_lNov}`});

  // modo demonstração: não grava, só mostra o resultado
  if(TREINO || DEMO || !sb){ setTimeout(()=>telaSucesso(pct, condicao), 400); return; }

  try{
    // 1) upload da foto (se houver)
    let evidencias=[];
    if(state.foto){
      const nome=`${state.extintor.codigo}/${Date.now()}.jpg`;
      const { error:upErr } = await sb.storage.from(BUCKET).upload(nome, state.foto, {contentType:'image/jpeg'});
      if(!upErr){ const { data:pub } = sb.storage.from(BUCKET).getPublicUrl(nome); evidencias=[pub.publicUrl]; }
    }

    // Caminho B — captura de presença por GPS
    _foraLocal=false;
    const loc = await obterLocal();
    let gps = {};
    if(loc){
      gps.latitude=loc.lat; gps.longitude=loc.lng; gps.gps_precisao=loc.acc;
      const ax=state.extintor.latitude, ay=state.extintor.longitude;
      if(ax!=null && ay!=null){
        const d=distanciaMetros(loc.lat,loc.lng,ax,ay);
        gps.distancia_ativo=d; gps.fora_do_local=d>RAIO_TOLERANCIA; _foraLocal=gps.fora_do_local;
      } else {
        try{ await sb.from('extintores').update({latitude:loc.lat,longitude:loc.lng}).eq('id',state.extintor.id); }catch(e){}
        gps.fora_do_local=false;
      }
    }

    // turno do inspetor (corrige o bug de gravar tudo como "A")
    const _insp = state.efetivo.find(f=>String(f.id)===String(inspetor));
    const _turno = (_insp && ['A','B','C','D'].includes((_insp.turno||'').trim())) ? (_insp.turno).trim() : null;

    // 2) insere na tabela inspecoes existente
    const { error:insErr } = await sb.from('inspecoes').insert({
      tipo:'extintor', area:state.extintor.area, extintor_id:state.extintor.id,
      responsavel_id:inspetor, turno:_turno, checklist, conformidade_pct:pct, condicao,
      observacoes:document.getElementById('obs').value||null, evidencias, ...gps
    });
    if(insErr) throw insErr;

    // 3) atualiza última inspeção do extintor
    await sb.from('extintores').update({ultima_inspecao:new Date().toISOString()}).eq('id',state.extintor.id);

    // 3b) atualização de dados do extintor (recarga/troca), se solicitado
    if(_atualizaDados){
      const upd={};
      const ano=(document.getElementById('updAno')?.value||'').trim(); if(ano) upd.ano_fabricacao=parseInt(ano,10);
      const anel=(document.getElementById('updAnel')?.value||'').trim(); if(anel) upd.cor_anel=anel;
      const carga=(document.getElementById('updCarga')?.value||'').trim(); if(carga) upd.validade_carga=carga;
      const hidro=(document.getElementById('updHidro')?.value||'').trim(); if(hidro) upd.validade_hidrostatico=hidro;
      if(window._retesteHoje){ upd.data_reteste = new Date().toISOString().slice(0,10); }
      if(Object.keys(upd).length){ const {error:updErr}=await sb.from('extintores').update(upd).eq('id',state.extintor.id); if(updErr) throw updErr; }
    }

    // 4) se foi retirado, registra a troca (série/selo do novo extintor)
    if(retirado){ try{ await registrarTrocaInterna(); }catch(e){} }

    telaSucesso(pct, condicao);
  }catch(err){
    btn.disabled=false; btn.classList.remove('busy'); btn.textContent='Salvar inspeção';
    alert('Erro ao salvar: '+(err.message||err));
  }
}

function telaSucesso(pct, condicao){
  const ok = condicao==='conforme';
  app.innerHTML = `<div class="card"><div class="success">
    <div class="ico" style="${ok?'':'background:var(--ncbg);color:var(--nc)'}">${ok?'✓':'!'}</div>
    <h2>${TREINO?'Inspeção demonstrativa concluída':'Inspeção registrada'}</h2>
    ${(!TREINO&&_foraLocal)?'<p style="color:var(--nc);font-weight:700;margin:0 0 4px">⚠ Inspeção salva FORA do local do ativo — sujeita a revisão</p>':''}
    ${TREINO?'<p style="color:var(--warn);font-weight:700;margin:0 0 4px">🎓 Treinamento — nada foi gravado no sistema</p>':''}
    <p style="color:var(--muted);margin:0 0 4px">${state.extintor.codigo} · conformidade ${pct}%</p>
    <p style="font-weight:700;color:${ok?'var(--ok)':'var(--nc)'}">${ok?'Conforme':'Não conforme — abrir tratativa'}</p>
    <button class="save" style="margin-top:16px" onclick="${(getParam('ext')||getParam('t'))?'location.reload()':'listaExtintores()'}">${(getParam('ext')||getParam('t'))?'Nova inspeção':'‹ Voltar à lista'}</button>
  </div></div>`;
}

async function telaQR(){
  if(!adminOK()){ telaAdminGate(); return; }
  app.innerHTML='<div class="loading"><div class="spin"></div>Gerando QR Codes…</div>';
  let data;
  if(!sb){ DEMO=true; data=MOCK_EXT; }
  else{
    try{ const r = await sb.from('extintores').select('codigo,tipo,local,token').eq('status','ativo').order('codigo'); if(r.error) throw r.error; data=r.data||[]; }
    catch(e){ DEMO=true; data=MOCK_EXT; }
  }
  data = ordenarPorNumero(data);
  const base = location.href.split('?')[0];
  if(typeof QRCode==='undefined'){
    app.innerHTML = bannerDemo()+'<div class="card"><div class="alert warn">Os QR Codes precisam de internet para serem gerados. Abra a página publicada no GitHub para gerar e imprimir.</div></div>';
    return;
  }
  app.innerHTML = bannerDemo()+'<h2 class="sec no-print">Imprima e cole em cada extintor</h2>' +
    data.map(e=>`<div class="qr-item"><div id="q-${e.codigo}" class="qrc"></div>
      <div class="c">${e.codigo}</div><div class="m">${e.tipo} · ${e.local||''}</div></div>`).join('') +
    '<button class="ghost no-print" onclick="window.print()">🖨 Imprimir todos</button>';
  data.forEach(e=>{
    new QRCode(document.getElementById('q-'+e.codigo), {text:`${base}?t=${e.token||e.codigo}`, width:200, height:200, correctLevel:QRCode.CorrectLevel.M});
  });
}

function erro(msg){ return `<div class="card"><div class="alert nc">⚠ ${msg}</div></div>`; }

init();
</script>
</body>
</html>
