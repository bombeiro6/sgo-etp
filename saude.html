<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGO-ETP · Saúde do Sistema</title>
<style>
  :root{
    --navy:#0A2240; --teal:#007B6E;
    --ok:#1E9E5A; --warn:#E8A100; --fail:#C0392B;
    --bg:#F4F6F8; --card:#FFFFFF; --ink:#1B2733; --muted:#5A6B7B; --line:#E2E8F0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:40px}
  header{background:var(--navy);color:#fff;padding:18px 16px}
  header .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  header h1{font-size:1.05rem;font-weight:700;letter-spacing:.2px}
  header .sub{font-size:.78rem;color:#9FB3C8;margin-top:2px}
  .accent{height:3px;background:var(--teal)}
  .wrap{max-width:760px;margin:0 auto;padding:16px}

  .banner{display:flex;align-items:center;gap:12px;border-radius:12px;padding:16px;
          color:#fff;margin-bottom:16px;font-weight:600}
  .banner.ok{background:var(--ok)} .banner.warn{background:var(--warn)} .banner.fail{background:var(--fail)}
  .banner .dot{width:14px;height:14px;border-radius:50%;background:#fff;flex:none;
               box-shadow:0 0 0 4px rgba(255,255,255,.25)}
  .banner small{display:block;font-weight:400;opacity:.9;font-size:.78rem;margin-top:2px}

  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  button{font:inherit;border:0;border-radius:8px;padding:9px 14px;cursor:pointer;font-weight:600}
  .btn-primary{background:var(--teal);color:#fff}
  .btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .auto{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:6px}

  .grid{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 14px 14px 16px;
        position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--muted)}
  .card.ok::before{background:var(--ok)} .card.warn::before{background:var(--warn)} .card.fail::before{background:var(--fail)}
  .card .name{font-weight:700;font-size:.92rem}
  .card .meta{display:flex;justify-content:space-between;align-items:flex-end;margin-top:8px}
  .card .count{font-size:1.6rem;font-weight:800;line-height:1}
  .card .count .lbl{font-size:.7rem;font-weight:500;color:var(--muted);display:block}
  .card .lat{font-size:.78rem;color:var(--muted);text-align:right}
  .card .status{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:6px}
  .card.ok .status{color:var(--ok)} .card.warn .status{color:var(--warn)} .card.fail .status{color:var(--fail)}

  h2{font-size:.82rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
     margin:22px 0 10px;font-weight:700}
  .errlist{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .err{padding:12px 14px;border-top:1px solid var(--line)}
  .err:first-child{border-top:0}
  .err .ev{font-weight:700;font-size:.85rem;color:var(--fail)}
  .err .pg{font-size:.74rem;color:var(--muted);margin-top:1px}
  .err .stk{font-size:.72rem;color:var(--muted);font-family:ui-monospace,Menlo,monospace;
            white-space:pre-wrap;margin-top:6px;max-height:84px;overflow:auto}
  .empty{padding:16px;color:var(--muted);font-size:.85rem;text-align:center}
  footer{max-width:760px;margin:24px auto 0;padding:0 16px;color:var(--muted);font-size:.72rem;text-align:center}
  .updated{font-size:.74rem;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="row">
    <div>
      <h1>SGO-ETP · Saúde do Sistema</h1>
      <div class="sub">Emergência · Terminal Parauapebas</div>
    </div>
    <div class="updated" id="updated">—</div>
  </div>
</header>
<div class="accent"></div>

<div class="wrap">
  <div class="banner" id="banner"><span class="dot"></span>
    <div><span id="banner-txt">Verificando…</span><small id="banner-sub">Conectando ao banco de dados</small></div>
  </div>

  <div class="toolbar">
    <button class="btn-primary" id="refresh">Atualizar agora</button>
    <button class="btn-ghost" id="test">Gerar log de teste</button>
    <label class="auto"><input type="checkbox" id="autochk"> Auto (30s)</label>
  </div>

  <div class="grid" id="grid"></div>

  <h2>Últimos erros registrados</h2>
  <div class="errlist" id="errors"><div class="empty">Carregando…</div></div>
</div>

<footer>SGO-ETP · health check · os dados desta página vêm direto do Supabase via API REST.</footer>

<script>
/* ====== CONFIG — ajuste estes 3 itens ====== */
var SUPABASE_URL = 'https://SEU-PROJETO.supabase.co';
var SUPABASE_ANON_KEY = 'SUA-ANON-KEY';
// Nomes EXATOS das suas tabelas no Supabase. Edite conforme o seu schema:
var TABELAS = ['extintores', 'hidrantes', 'inspecoes', 'efetivo', 'logs'];
var LIMITE_LATENCIA_MS = 1500; // acima disso, status fica em "atenção"
/* =========================================== */

var BASE = SUPABASE_URL.replace(/\/+$/, '');
var H = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };

function setBanner(state, txt, sub){
  var b = document.getElementById('banner');
  b.className = 'banner ' + state;
  document.getElementById('banner-txt').textContent = txt;
  document.getElementById('banner-sub').textContent = sub;
}

async function checarTabela(nome){
  var inicio = performance.now();
  try{
    var r = await fetch(BASE + '/rest/v1/' + nome + '?select=*', {
      method:'HEAD', headers: Object.assign({ 'Prefer':'count=exact' }, H)
    });
    var lat = Math.round(performance.now() - inicio);
    if(!r.ok){
      return { nome:nome, status:'fail', lat:lat, count:null, msg:'HTTP ' + r.status };
    }
    var cr = r.headers.get('content-range') || '';      // ex.: "0-0/126" ou "*/126"
    var total = cr.indexOf('/') >= 0 ? cr.split('/')[1] : null;
    var count = (total === null || total === '*') ? null : parseInt(total, 10);
    var status = lat > LIMITE_LATENCIA_MS ? 'warn' : 'ok';
    return { nome:nome, status:status, lat:lat, count:count, msg:null };
  }catch(e){
    return { nome:nome, status:'fail', lat:Math.round(performance.now()-inicio), count:null, msg:'sem conexão' };
  }
}

function cardHTML(c){
  var statusTxt = c.status==='ok' ? 'Operacional' : (c.status==='warn' ? 'Atenção · lento' : 'Falha');
  var count = c.count===null ? '—' : c.count.toLocaleString('pt-BR');
  var extra = c.msg ? (' · ' + c.msg) : '';
  return '<div class="card ' + c.status + '">' +
    '<div class="name">' + c.nome + '</div>' +
    '<div class="meta">' +
      '<div class="count">' + count + '<span class="lbl">registros</span></div>' +
      '<div class="lat">' + c.lat + ' ms</div>' +
    '</div>' +
    '<div class="status">' + statusTxt + extra + '</div>' +
  '</div>';
}

async function carregarErros(){
  var box = document.getElementById('errors');
  try{
    var r = await fetch(BASE + '/rest/v1/logs?nivel=eq.error&order=ts.desc&limit=5&select=ts,evento,pagina,stack,dados', { headers:H });
    if(!r.ok){ box.innerHTML = '<div class="empty">Tabela de logs ainda não acessível (rode o setup_logs.sql).</div>'; return; }
    var rows = await r.json();
    if(!rows.length){ box.innerHTML = '<div class="empty">Nenhum erro registrado. 🎉</div>'; return; }
    box.innerHTML = rows.map(function(e){
      var quando = e.ts ? new Date(e.ts).toLocaleString('pt-BR') : '';
      var stk = e.stack ? String(e.stack).slice(0,500) : (e.dados ? JSON.stringify(e.dados) : '');
      return '<div class="err">' +
        '<div class="ev">' + (e.evento || 'erro') + '</div>' +
        '<div class="pg">' + quando + ' · ' + (e.pagina || '') + '</div>' +
        (stk ? '<div class="stk">' + stk.replace(/</g,'&lt;') + '</div>' : '') +
      '</div>';
    }).join('');
  }catch(e){
    box.innerHTML = '<div class="empty">Não foi possível ler os logs.</div>';
  }
}

async function rodar(){
  setBanner('warn','Verificando…','Consultando o banco de dados');
  document.getElementById('grid').innerHTML = '';
  var resultados = await Promise.all(TABELAS.map(checarTabela));
  document.getElementById('grid').innerHTML = resultados.map(cardHTML).join('');

  var falhas = resultados.filter(function(r){return r.status==='fail';}).length;
  var lentas = resultados.filter(function(r){return r.status==='warn';}).length;
  if(falhas){
    setBanner('fail','Sistema com falha', falhas + ' de ' + resultados.length + ' verificações falharam');
  }else if(lentas){
    setBanner('warn','Operacional com lentidão', lentas + ' tabela(s) acima de ' + LIMITE_LATENCIA_MS + ' ms');
  }else{
    var media = Math.round(resultados.reduce(function(s,r){return s+r.lat;},0)/resultados.length);
    setBanner('ok','Sistema operacional','Todas as verificações OK · latência média ' + media + ' ms');
  }
  document.getElementById('updated').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR');
  carregarErros();
}

document.getElementById('refresh').addEventListener('click', rodar);
document.getElementById('test').addEventListener('click', function(){
  if(window.SGOLog){ SGOLog.error('teste_saude', { origem:'saude.html', quando:new Date().toISOString() }); }
  else{
    // fallback: grava direto se log.js não estiver incluído aqui
    fetch(BASE + '/rest/v1/logs', { method:'POST',
      headers: Object.assign({'Content-Type':'application/json','Prefer':'return=minimal'}, H),
      body: JSON.stringify({ nivel:'error', evento:'teste_saude', pagina:'/saude.html', dados:{origem:'botao'} })
    });
  }
  setTimeout(carregarErros, 700);
});

var timer = null;
document.getElementById('autochk').addEventListener('change', function(e){
  if(e.target.checked){ timer = setInterval(rodar, 30000); } else { clearInterval(timer); }
});

rodar();
</script>
</body>
</html>
