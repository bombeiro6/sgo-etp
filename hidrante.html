/* Cliente Supabase próprio via fetch (sem CDN externo — funciona em rede corporativa) */
function makeClient(url, key){
  const H = { apikey:key, Authorization:'Bearer '+key };
  const errOf = async r => r.ok ? null : (await r.json().catch(()=>({message:'HTTP '+r.status})));
  function query(table){
    const st={select:'*',filters:[],order:'',limit:'',single:false};
    const run=async()=>{
      let q=`${url}/rest/v1/${table}?select=${encodeURIComponent(st.select)}`;
      st.filters.forEach(f=>q+='&'+f); q+=st.order+st.limit;
      try{
        const r=await fetch(q,{headers:H});
        let data=await r.json();
        if(!r.ok) return {data:null,error:data};
        if(st.single) data=Array.isArray(data)?(data[0]||null):data;
        return {data,error:null};
      }catch(e){ return {data:null,error:e}; }
    };
    const api={
      select(c){ st.select=c||'*'; return api; },
      eq(c,v){ st.filters.push(`${c}=eq.${encodeURIComponent(v)}`); return api; },
      order(c,o){ st.order=`&order=${c}.${(o&&o.ascending===false)?'desc':'asc'}`; return api; },
      limit(n){ st.limit=`&limit=${n}`; return api; },
      maybeSingle(){ st.single=true; return run(); },
      then(res,rej){ return run().then(res,rej); }
    };
    return api;
  }
  function from(table){
    return {
      select(c){ return query(table).select(c); },
      insert(obj){ return fetch(`${url}/rest/v1/${table}`,{method:'POST',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(obj)}).then(async r=>({error:await errOf(r)})); },
      update(obj){ return { eq:(c,v)=>fetch(`${url}/rest/v1/${table}?${c}=eq.${encodeURIComponent(v)}`,{method:'PATCH',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(obj)}).then(async r=>({error:await errOf(r)})) }; }
    };
  }
  const storage={ from(bucket){ return {
    upload(path,file,opts){ return fetch(`${url}/storage/v1/object/${bucket}/${path}`,{method:'POST',headers:{...H,'Content-Type':(opts&&opts.contentType)||'application/octet-stream'},body:file}).then(async r=>({error:await errOf(r)})); },
    getPublicUrl(path){ return {data:{publicUrl:`${url}/storage/v1/object/public/${bucket}/${path}`}}; }
  };}};
  return { from, storage };
}

/* ---------- Helpers ---------- */
function fmtData(d){ if(!d) return '—'; const [a,m,dia]=d.split('-'); return `${dia}/${m}/${a}`; }
function diasAte(d){ if(!d) return null; return Math.ceil((new Date(d)-new Date())/86400000); }

/* ---------- Router ---------- */
async function init(){
  await carregarEfetivo();
  const cod = getParam('hid');
  if(cod){ await abrirExtintor(cod); }
  else { await listaExtintores(); }

async function carregarEfetivo(){
  if(!sb){ DEMO=true; state.efetivo=MOCK_EFETIVO; return; }
  try{
    const { data, error } = await sb.from('efetivo').select('id,nome').eq('status','ativo').order('nome');
    if(error) throw error;
    state.efetivo = data || [];
  }catch(e){ DEMO=true; state.efetivo=MOCK_EFETIVO; }
}

/* ---------- Lista / seleção ---------- */
async function listaExtintores(){
  app.innerHTML = '<div class="loading"><div class="spin"></div>Buscando hidrantes…</div>';
  let data, inspSet=new Set();
  if(!sb){ DEMO=true; data=MOCK_EXT; }
  else{
    try{ const r = await sb.from('hidrantes').select('*').eq('status','ativo').order('codigo'); if(r.error) throw r.error; data=r.data||[]; }
    catch(e){ DEMO=true; data=MOCK_EXT; }
    try{
      const c=cicloAtual();
      const r2=await sb.from('inspecoes').select('hidrante_id,created_at').eq('tipo','hidrante');
      (r2.data||[]).forEach(x=>{ if(x.hidrante_id){ const t=new Date(x.created_at); if(t>=c.ini && t<=c.fim) inspSet.add(x.hidrante_id); } });
    }catch(e){}
  }
  if(!data.length){ app.innerHTML = bannerDemo()+'<div class="card">Nenhum hidrante cadastrado ainda.</div>'; return; }
  const faltam=data.filter(e=>!inspSet.has(e.id)).length;
  const resumo=`<div class="lista-resumo">Ciclo atual: <b class="ok">${data.length-faltam}</b> inspecionado(s) · <b class="no">${faltam}</b> falta(m)</div>`;
  app.innerHTML = bannerDemo()+'<h2 class="sec">Selecione o abrigo de hidrante</h2>' + resumo + data.map(e=>{
    const dias = diasAte(e.venc_hidrostatico);
    const aviso = dias!==null && dias<0 ? ' · ⚠ teste vencido' : (dias!==null && dias<30 ? ` · vence em ${dias}d` : '');
    const ok = inspSet.has(e.id);
    const stt = ok ? '<span class="stt ok">✓ ciclo</span>' : '<span class="stt no">● falta</span>';
    return `<div class="list-item ${ok?'':'falta'}" onclick="abrirExtintor('${e.codigo}')">

      <div style="display:flex;align-items:center">${stt}<div class="chev">›</div></div></div>`;
  }).join('');

/* ---------- Tela de inspeção ---------- */
async function abrirExtintor(codigo){
  app.innerHTML = '<div class="loading"><div class="spin"></div>Carregando hidrante…</div>';
  let data;
  if(!sb){ DEMO=true; data=MOCK_EXT.find(x=>x.codigo===codigo)||MOCK_EXT[0]; }
  else{
    try{ const r = await sb.from('hidrantes').select('*').eq('codigo',codigo).maybeSingle(); if(r.error) throw r.error; data=r.data; }
    catch(e){ DEMO=true; data=MOCK_EXT.find(x=>x.codigo===codigo)||MOCK_EXT[0]; }
  }
  if(!data){ app.innerHTML = erro(`Hidrante "${codigo}" não encontrado.`); return; }
  state.extintor = data; state.respostas = {}; state.foto = null; state.ultimaInsp = null;
  if(sb && !DEMO){
    try{
      const r = await sb.from('inspecoes').select('created_at,condicao').eq('hidrante_id',data.id).order('created_at',{ascending:false}).limit(1).maybeSingle();
      if(r.data) state.ultimaInsp = {data:(''+r.data.created_at).slice(0,10), condicao:r.data.condicao};
    }catch(e){}
  }
  // mangueiras do abrigo
  state.mangueiras = [];
  if(sb && !DEMO){
    try{ const rm=await sb.from('mangueiras').select('*').eq('hidrante_id',data.id).eq('status','ativa').order('validade'); if(rm.data) state.mangueiras=rm.data; }catch(e){}
  } else {
    state.mangueiras = [{id:'m1',numero_lacre:'16304',validade:'2026-06-30'},{id:'m2',numero_lacre:'23839',validade:'2026-10-30'}];
  }
  renderInspecao();
}

  {nome:'Chaves storz', sub:'Conectam e travam as juntas das mangueiras'},
  {nome:'Registro / válvula', sub:'Abre a água da rede de hidrantes'}

  'Abra o abrigo e retire a mangueira, conectando-a ao hidrante com a chave storz.',

/* Bloqueio da inspeção (piloto: PIN da equipe). A educação acima fica aberta a todos. */
function lockHTML(){
  return `
    <div class="card lock-card">
      <div class="lock-ic">🔒</div>
      <h2 style="margin:0 0 4px;font-size:17px">Inspeção restrita à equipe</h2>
      <p style="color:var(--muted);font-size:14px;margin:0 0 14px">Apenas a equipe de bombeiros. Informe o código da equipe para liberar o checklist.</p>
      <input id="pin" type="password" inputmode="numeric" placeholder="Código da equipe" style="text-align:center;letter-spacing:4px;font-size:18px" onkeydown="if(event.key==='Enter')desbloquear()">
      <button class="save" style="margin-top:12px" onclick="desbloquear()">Desbloquear inspeção</button>
    </div>`;
}

function inspecaoHTML(){
  const idx = ITENS.map((it,i)=>({it,i}));
  const coluna = idx.filter(x=>x.it.s==='Coluna do hidrante');
  const caixa  = idx.filter(x=>x.it.s==='Caixa de abrigo das mangueiras');
  const row = x=>`
    <div class="check">
      <div class="lbl">${x.it.t}</div>
      <div class="toggle">
        <button id="ok${x.i}" onclick="resp(${x.i},'ok')">OK</button>
        <button id="nc${x.i}" onclick="resp(${x.i},'nc')">NC</button>
        <button id="na${x.i}" onclick="resp(${x.i},'na')">NA</button>
      </div>
    </div>`;
  const e = state.extintor;
  const dias = diasAte(e.venc_hidrostatico);
  let alerta = '<div class="alert ok">✓ Abrigo ativo</div>';
  if(dias!==null && dias<0) alerta = `<div class="alert nc">⚠ Teste hidrostático das mangueiras VENCIDO em ${fmtData(e.venc_hidrostatico)}</div>`;
  else if(dias!==null && dias<30) alerta = `<div class="alert warn">⏱ Teste das mangueiras vence em ${dias} dia(s) — ${fmtData(e.venc_hidrostatico)}</div>`;
  let ultima = '—';
  if(state.ultimaInsp){ ultima = `${fmtData(state.ultimaInsp.data)} · ${state.ultimaInsp.condicao==='conforme'?'Conforme':'Não conforme'}`; }
  else if(e.ultima_inspecao){ ultima = fmtData((''+e.ultima_inspecao).slice(0,10)); }
  return `
    <div class="card id-card">
      <h2 class="sec">Dados do abrigo</h2>
      <div class="grid2">
        <div class="field"><label>TAG</label><span>${e.tag||e.codigo||'—'}</span></div>
        <div class="field"><label>Turno</label><span>${e.turno||'—'}</span></div>
        <div class="field"><label>Teste hidrostático</label><span>${fmtData(e.venc_hidrostatico)}</span></div>
        <div class="field"><label>Última inspeção</label><span>${ultima}</span></div>
      </div>
      ${alerta}
    </div>

    <div class="card">
      <h2 class="sec">Coluna do hidrante</h2>
      ${coluna.map(row).join('')}
      <div class="check"><div class="lbl">Pressão (mca)</div><input id="pressao" class="med" type="number" inputmode="decimal" placeholder="—"></div>
      <div class="check"><div class="lbl">Vazão (L/min)</div><input id="vazao" class="med" type="number" inputmode="decimal" placeholder="—"></div>
    </div>

    <div class="card">
      <h2 class="sec">Caixa de abrigo das mangueiras</h2>
      ${caixa.map(row).join('')}
      <div class="check"><div class="lbl">Chaves (quantidade)</div><input id="chaves" class="med" type="number" inputmode="numeric" placeholder="—"></div>
    </div>

    <div class="card">
      <h2 class="sec">Mangueiras do abrigo</h2>
      ${(state.mangueiras||[]).length ? state.mangueiras.map((m,i)=>`
        <div class="check">
          <div class="lbl">Lacre ${m.numero_lacre||'—'}${m.cor_lacre?` · <b style="color:var(--ink)">${m.cor_lacre}</b>`:''}<span style="display:block;font-size:12px;color:var(--muted)">Validade: ${fmtData(m.validade)}</span></div>
          <button class="ghost" style="width:auto;padding:8px 14px;margin:0" onclick="trocarMangueira(${i})">Trocar</button>
        </div>`).join('') : '<p style="color:var(--muted);font-size:13px;margin:0">Nenhuma mangueira cadastrada.</p>'}
      <div id="trocaMangBox"></div>
    </div>

    <div class="card">
      <h2 class="sec">Inspetor</h2>
      <select id="inspetor">
        <option value="">Selecione o responsável…</option>
        ${state.efetivo.map(f=>`<option value="${f.id}" ${f.id===lastInspetor()?'selected':''}>${f.nome}</option>`).join('')}
      </select>
    </div>

    <div class="card">
      <h2 class="sec">Foto (evidência)</h2>
      <label class="photo-btn">📷 Tirar foto do abrigo
        <input type="file" accept="image/*" capture="environment" style="display:none" onchange="capturarFoto(this)">
      </label>
      <img id="prev" class="photo-prev">
    </div>

    <div class="card">
      <h2 class="sec">Observações</h2>
      <textarea id="obs" placeholder="Anote qualquer detalhe (opcional)…"></textarea>
    </div>

    <button id="btnSalvar" class="save" onclick="salvar()">Salvar inspeção</button>`;
}

async function desbloquear(){
  const v=(document.getElementById('pin').value||'').trim();
  if(await sgoAcesso('equipe', v)){ unlocked=true; try{sessionStorage.setItem('sgo_unlocked','1');}catch(e){} document.getElementById('inspArea').innerHTML=inspecaoHTML(); }
  else { alert('Código incorreto. Procure o supervisor da equipe.'); }
}

/* ---- Troca de mangueira (mantém o abrigo) ---- */
function trocarMangueira(i){
  const m=state.mangueiras[i];
  const cores=['Vermelho','Verde','Azul','Amarelo','Branco','Preto','Laranja','Cinza'];
  document.getElementById('trocaMangBox').innerHTML=`
    <div style="margin-top:10px;padding:12px;border:1.5px dashed var(--teal);border-radius:10px;background:#f3fbfa">
      <p style="font-size:13px;color:var(--muted);margin:0 0 10px">Trocando a mangueira de lacre <b>${m.numero_lacre||'—'}</b>${m.cor_lacre?` (cor ${m.cor_lacre})`:''}. Informe a nova:</p>
      <input id="novoLacre" placeholder="Novo nº de lacre" style="margin-bottom:8px">
      <select id="novaCor" style="margin-bottom:8px;width:100%;padding:11px;border:1.5px solid var(--line);border-radius:10px;font-size:15px">
        <option value="">Cor do lacre…</option>
        ${cores.map(c=>`<option value="${c}"${m.cor_lacre===c?' selected':''}>${c}</option>`).join('')}
      </select>
      <input id="novaValidade" type="date" style="margin-bottom:8px">
      <button class="save" onclick="confirmarTrocaMang(${i})">Confirmar troca</button>
    </div>`;
}

async function confirmarTrocaMang(i){
  const m=state.mangueiras[i];
  const lacre=(document.getElementById('novoLacre').value||'').trim();
  const cor=(document.getElementById('novaCor').value||'').trim();
  const validade=document.getElementById('novaValidade').value||null;
  if(!lacre && !validade && !cor){ alert('Informe o novo lacre, a cor ou a nova validade.'); return; }
  if(DEMO || !sb){
    alert('Troca de mangueira registrada (modo demonstração).');
    m.numero_lacre=lacre||m.numero_lacre; m.validade=validade||m.validade; m.cor_lacre=cor||m.cor_lacre;
    document.getElementById('inspArea').innerHTML=inspecaoHTML(); return;
  }
  try{
    await sb.from('trocas_mangueiras').insert({mangueira_id:m.id, hidrante_id:state.extintor.id, lacre_anterior:m.numero_lacre, validade_anterior:m.validade, cor_anterior:m.cor_lacre||null, lacre_novo:lacre||null, validade_nova:validade||null, cor_nova:cor||null});
    await sb.from('mangueiras').update({numero_lacre:lacre||m.numero_lacre, validade:validade||m.validade, cor_lacre:cor||m.cor_lacre}).eq('id',m.id);
    m.numero_lacre=lacre||m.numero_lacre; m.validade=validade||m.validade; m.cor_lacre=cor||m.cor_lacre;
    const novoVenc = state.mangueiras.map(x=>x.validade).filter(Boolean).sort()[0]||null;
    await sb.from('hidrantes').update({venc_hidrostatico:novoVenc}).eq('id',state.extintor.id);
    state.extintor.venc_hidrostatico=novoVenc;
    alert('Troca de mangueira registrada.');
    document.getElementById('inspArea').innerHTML=inspecaoHTML();
  }catch(err){ alert('Erro ao registrar troca: '+(err.message||err)); }
}

function resp(i,st){
  state.respostas[i]=st;
  document.getElementById('ok'+i).className = st==='ok'?'on-ok':'';
  document.getElementById('nc'+i).className = st==='nc'?'on-nc':'';
  document.getElementById('na'+i).className = st==='na'?'on-na':'';
}

/* Comprime a foto antes de enviar (mantém leve) */
function capturarFoto(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      const max=1000, sc=Math.min(1,max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=img.width*sc; cv.height=img.height*sc;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(b=>{ state.foto=b; const p=document.getElementById('prev'); p.src=URL.createObjectURL(b); p.style.display='block'; }, 'image/jpeg', 0.6);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- Salvar ---------- */
async function salvar(){
  const total=ITENS.length, respondidos=Object.keys(state.respostas).length;
  if(respondidos<total){ alert(`Marque todos os itens (${respondidos}/${total}).`); return; }
  const inspetor=document.getElementById('inspetor').value;
  if(!inspetor){ alert('Selecione o inspetor responsável.'); return; }
  try{ sessionStorage.setItem('sgo_inspetor', inspetor); }catch(e){}

  const btn=document.getElementById('btnSalvar');
  btn.disabled=true; btn.classList.add('busy'); btn.textContent='Salvando…';

  // monta checklist e conformidade (OK/NC/NA — NA não entra no cálculo)
  const checklist=ITENS.map((it,i)=>{ const st=state.respostas[i]; return {secao:it.s, item:it.t, situacao:st, conforme: st==='ok'?true:(st==='nc'?false:null)}; });
  const na=checklist.filter(c=>c.situacao==='na').length;
  const denom=total-na;
  const conformes=checklist.filter(c=>c.situacao==='ok').length;
  const pct=denom>0?Math.round(conformes/denom*100):100;
  const condicao = pct===100 ? 'conforme' : 'nao_conforme';
  // medições do Anexo I (numéricas, opcionais)
  const g=id=>{const el=document.getElementById(id); return el&&el.value!==''?el.value:null;};
  const checklistFull = checklist.concat([
    {secao:'Coluna do hidrante', item:'Pressão (mca)', valor:g('pressao')},
    {secao:'Coluna do hidrante', item:'Vazão (L/min)', valor:g('vazao')},
    {secao:'Caixa de abrigo das mangueiras', item:'Chaves (qtd)', valor:g('chaves')}
  ]);

  // modo demonstração: não grava, só mostra o resultado
  if(DEMO || !sb){ setTimeout(()=>telaSucesso(pct, condicao), 400); return; }

  try{
    // 1) upload da foto (se houver)
    let evidencias=[];
    if(state.foto){
      try{
        const nome=`${state.extintor.codigo}/${Date.now()}.jpg`;
        const { error:upErr } = await sb.storage.from(BUCKET).upload(nome, state.foto, {contentType:'image/jpeg'});
        if(!upErr){ const { data:pub } = sb.storage.from(BUCKET).getPublicUrl(nome); evidencias=[pub.publicUrl]; }
      }catch(e){ /* offline: salva sem foto */ }
    }

    // 2) insere na tabela inspecoes (com fila offline)
    const _payload = {
      tipo:'hidrante', area:state.extintor.area, hidrante_id:state.extintor.id,
      responsavel_id:inspetor, checklist:checklistFull, conformidade_pct:pct, condicao,
      observacoes:document.getElementById('obs').value||null, evidencias
    };
    let _offline=false;
    try{
      const { error:insErr } = await sb.from('inspecoes').insert(_payload);
      if(insErr) throw insErr;
    }catch(e){
      const msg=((e&&(e.message||e))+'').toLowerCase();
      const _semRede = !navigator.onLine || /failed to fetch|networkerror|network error|fetch|timeout|load failed/.test(msg);
      if(_semRede && window.SGOOffline){ SGOOffline.enqueue(_payload); _offline=true; }
      else throw e;
    }

    // 3) atualiza última inspeção do hidrante (só online)
    if(!_offline){ try{ await sb.from('hidrantes').update({ultima_inspecao:new Date().toISOString()}).eq('id',state.extintor.id); }catch(e){} }

    telaSucesso(pct, condicao, _offline);
  }catch(err){
    btn.disabled=false; btn.classList.remove('busy'); btn.textContent='Salvar inspeção';
    alert('Erro ao salvar: '+(err.message||err));
  }
}

function telaSucesso(pct, condicao, offline){
  const ok = condicao==='conforme';
  app.innerHTML = `<div class="card"><div class="success">
    <div class="ico" style="${ok?'':'background:var(--ncbg);color:var(--nc)'}">${ok?'✓':'!'}</div>
    <h2>${offline?'Inspeção salva offline':'Inspeção registrada'}</h2>
    ${offline?'<p style="color:var(--warn);font-weight:700;margin:0 0 4px">📴 Sem conexão — guardada no aparelho e enviada quando a rede voltar.</p>':''}
    <p style="color:var(--muted);margin:0 0 4px">${state.extintor.codigo} · conformidade ${pct}%</p>
    <p style="font-weight:700;color:${ok?'var(--ok)':'var(--nc)'}">${ok?'Conforme':'Não conforme — abrir tratativa'}</p>
    <button class="save" style="margin-top:16px" onclick="${getParam('hid')?'location.reload()':'listaExtintores()'}">${getParam('hid')?'Nova inspeção':'‹ Voltar à lista'}</button>
  </div></div>`;
}

/* ---------- Aba QR Codes ---------- */
function cicloAtual(){
  const now=new Date(); let sy=now.getFullYear(), sm=now.getMonth();
  if(now.getDate()<21){ sm-=1; if(sm<0){sm=11;sy--;} }
  return { ini:new Date(sy,sm,21,0,0,0), fim:new Date(sy,sm+1,20,23,59,59) };
}
async function telaQR(){
  app.innerHTML='<div class="loading"><div class="spin"></div>Gerando QR Codes…</div>';
  let data, inspSet=new Set();
  if(!sb){ DEMO=true; data=MOCK_EXT; }
  else{
    try{ const r = await sb.from('hidrantes').select('id,codigo,local,qtd_mangueiras').eq('status','ativo').order('codigo'); if(r.error) throw r.error; data=r.data||[]; }
    catch(e){ DEMO=true; data=MOCK_EXT; }
    try{
      const c=cicloAtual();
      const r2=await sb.from('inspecoes').select('hidrante_id,created_at').eq('tipo','hidrante');
      (r2.data||[]).forEach(x=>{ if(x.hidrante_id){ const t=new Date(x.created_at); if(t>=c.ini && t<=c.fim) inspSet.add(x.hidrante_id); } });
    }catch(e){}
  }
  const base = location.href.split('?')[0];
  if(typeof QRCode==='undefined'){
    app.innerHTML = bannerDemo()+'<div class="card"><div class="alert warn">Os QR Codes precisam de internet para serem gerados. Abra a página publicada no GitHub para gerar e imprimir.</div></div>';
    return;
  }
  const faltam=data.filter(e=>!inspSet.has(e.id)).length;
  const resumo=`<div class="qr-resumo no-print">Ciclo atual: <b class="ok">${data.length-faltam}</b> inspecionado(s) · <b class="no">${faltam}</b> falta(m) inspecionar</div>`;
  app.innerHTML = bannerDemo()+'<h2 class="sec no-print">Imprima e cole em cada abrigo de hidrante</h2>' + resumo +
    data.map(e=>{ const ok=inspSet.has(e.id);
      const st = ok ? '<div class="st ok">● Inspecionado no ciclo</div>' : '<div class="st no">● Falta inspecionar</div>';
      return `<div class="qr-item ${ok?'':'falta'}">${st}<canvas id="q-${e.codigo}"></canvas>
      <div class="c">${e.codigo}</div><div class="m">${e.local||''}</div></div>`; }).join('') +
    '<button class="ghost no-print" onclick="window.print()">🖨 Imprimir todos</button>';
  data.forEach(e=>{
    QRCode.toCanvas(document.getElementById('q-'+e.codigo), `${base}?hid=${e.codigo}`, {width:200,margin:1});
  });
}

function erro(msg){ return `<div class="card"><div class="alert nc">⚠ ${msg}</div></div>`; }

init();
