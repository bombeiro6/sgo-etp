<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGO-ETP · Relatório de Medição</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A2240">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="sgo-config.js"></script>
<script src="sgo-auth.js"></script>
<style>
  :root{ --navy:#0A2240; --teal:#007B6E; --bg:#eef1f5; --card:#fff; --line:#e3e9f0; --ink:#0A2240; --muted:#62748a; --ok:#1F7A44; --warn:#B7791F; --bad:#C0392B; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  header .mk{width:34px;height:34px;border-radius:9px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto}
  header h1{font-size:15px;margin:0}
  header small{display:block;opacity:.75;font-weight:400;font-size:11px}
  .wrap{max-width:980px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 2px rgba(16,34,64,.05),0 4px 14px rgba(16,34,64,.06)}
  .cyc{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .cyc button{background:#f1f5f9;border:1px solid var(--line);border-radius:10px;width:42px;height:42px;font-size:20px;font-weight:800;color:var(--navy);cursor:pointer}
  .cyc .per{text-align:center;flex:1}
  .cyc .per b{font-size:17px;display:block}
  .cyc .per span{font-size:11px;color:var(--muted)}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
  .kpi{border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center}
  .kpi .v{font-size:25px;font-weight:800;line-height:1;letter-spacing:-.5px}
  .kpi .l{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-top:5px;font-weight:700}
  h3{font-size:13px;margin:2px 0 12px;color:var(--navy)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 8px;text-align:left;border-bottom:1px solid var(--line)}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:800}
  td.n,th.n{text-align:right}
  .chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  .ok{background:#e7f4ec;color:var(--ok)} .wn{background:#fbf3e2;color:var(--warn)} .bd{background:#fbeae8;color:var(--bad)}
  .btn{display:block;width:100%;background:var(--bad);color:#fff;border:0;border-radius:12px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;text-align:center}
  .btn.teal{background:var(--teal)}
  .gate{max-width:380px;margin:60px auto;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px}
  .gate input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:18px;text-align:center;letter-spacing:3px;margin:12px 0}
  .loading{text-align:center;padding:50px;color:var(--muted)}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:s .8s linear infinite;margin:0 auto 12px}
  @keyframes s{to{transform:rotate(360deg)}}
  .err{color:var(--bad);font-size:13px;min-height:16px;margin-top:6px}
  .muted{color:var(--muted);font-size:12px}
  @media(min-width:760px){ .kpis{grid-template-columns:repeat(4,1fr)} }
</style>
</head>
<body>
<header>
  <div class="mk">📄</div>
  <div><h1>Relatório de Medição — SGO-ETP<small>Bombeiros · Terminal Parauapebas · Vale</small></h1></div>
</header>
<div class="wrap" id="app"><div class="loading"><div class="spin"></div>Carregando…</div></div>

<script>
const SUPABASE_URL=(window.SGO&&SGO.URL)||"https://wcyftjpsbifyvuqzxmbs.supabase.co";
const SUPABASE_KEY=(window.SGO&&SGO.KEY)||"";
let sb=null; try{ if(window.supabase) sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY); }catch(e){}
const app=document.getElementById('app');
const _tipo={extintor:'Extintor',hidrante:'Hidrante',valvula:'Válvula',casa_bomba:'Casa de Bombas'};
let gOk=false; try{ gOk=sessionStorage.getItem('sgo_gestor')==='1'; }catch(e){}
let offset=-1;            // -1 = último ciclo fechado
let DADOS=null;

function pad(n){ return (n<10?'0':'')+n; }
function fmt(d){ return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }
function fmtCurto(d){ return pad(d.getDate())+'/'+pad(d.getMonth()+1); }

function ciclo(off){
  const now=new Date();
  let sy=now.getFullYear(), sm=now.getMonth();
  if(now.getDate()<21){ sm-=1; if(sm<0){sm=11;sy--;} }
  sm+=off;
  while(sm<0){ sm+=12; sy--; }
  while(sm>11){ sm-=12; sy++; }
  const start=new Date(sy,sm,21,0,0,0);
  const end=new Date(sy,sm+1,20,23,59,59);
  return {start,end};
}

function start(){ if(gOk) carregar(); else gate(); }
function gate(){
  app.innerHTML=`<div class="gate"><div style="font-size:40px">🔒</div>
    <h2 style="margin:6px 0 4px;font-size:18px">Acesso gerencial</h2>
    <p class="muted">Informe o código de gestor.</p>
    <input id="gp" type="password" inputmode="numeric" placeholder="Código" onkeydown="if(event.key==='Enter')entrar()">
    <button class="btn teal" onclick="entrar()">Entrar</button>
    <div class="err" id="ge"></div></div>`;
}
async function entrar(){
  const v=(document.getElementById('gp').value||'').trim();
  if(await sgoAcesso('gestor', v)){ gOk=true; try{sessionStorage.setItem('sgo_gestor','1');}catch(e){} carregar(); }
  else document.getElementById('ge').textContent='Código incorreto.';
}

async function carregar(){
  app.innerHTML='<div class="loading"><div class="spin"></div>Apurando o ciclo…</div>';
  if(!sb){ app.innerHTML='<div class="loading">Sem conexão com o banco.</div>'; return; }
  const {start:ini,end:fim}=ciclo(offset);
  try{
    const [insR,efR]=await Promise.all([
      sb.from('inspecoes').select('created_at,tipo,area,conformidade_pct,condicao,responsavel_id')
        .gte('created_at',ini.toISOString()).lte('created_at',fim.toISOString())
        .order('created_at',{ascending:true}),
      sb.from('efetivo').select('id,nome')
    ]);
    const efN={}; (efR.data||[]).forEach(e=>efN[e.id]=e.nome);
    DADOS={ ini, fim, ins:insR.data||[], efN };
    render();
  }catch(e){ app.innerHTML='<div class="loading">Erro: '+(e.message||e)+'</div>'; }
}

function agrupa(arr, keyFn){
  const m={};
  arr.forEach(r=>{ const k=keyFn(r)||'—'; (m[k]||(m[k]={n:0,soma:0,nc:0})); m[k].n++; m[k].soma+=(r.conformidade_pct||0); if(r.condicao!=='conforme')m[k].nc++; });
  return Object.keys(m).map(k=>({k, n:m[k].n, media:m[k].n?+(m[k].soma/m[k].n).toFixed(1):0, nc:m[k].nc})).sort((a,b)=>b.n-a.n);
}
function chip(p){ const c=p>=97?'ok':p>=90?'wn':'bd'; return '<span class="chip '+c+'">'+p+'%</span>'; }

function render(){
  const {ini,fim,ins,efN}=DADOS;
  const total=ins.length;
  const conf=ins.filter(r=>r.condicao==='conforme').length;
  const media= total? +(ins.reduce((a,r)=>a+(r.conformidade_pct||0),0)/total).toFixed(1):0;
  const ncs=total-conf;
  const dias=new Set(ins.map(r=>(r.created_at||'').slice(0,10))).size;
  const porTipo=agrupa(ins, r=>_tipo[r.tipo]||r.tipo);
  const porArea=agrupa(ins, r=>r.area);
  const porResp=agrupa(ins, r=>efN[r.responsavel_id]);

  app.innerHTML=`
    <div class="card cyc">
      <button onclick="muda(-1)">‹</button>
      <div class="per"><b>${fmtCurto(ini)} a ${fmtCurto(fim)}</b><span>ciclo de medição (21 → 20) · ${fim.getFullYear()}</span></div>
      <button onclick="muda(1)">›</button>
    </div>

    <div class="card">
      <div class="kpis">
        <div class="kpi"><div class="v" style="color:var(--navy)">${total}</div><div class="l">Inspeções no ciclo</div></div>
        <div class="kpi"><div class="v" style="color:var(--teal)">${media}%</div><div class="l">Conformidade média</div></div>
        <div class="kpi"><div class="v" style="color:${ncs?'var(--bad)':'var(--ok)'}">${ncs}</div><div class="l">Não conformes</div></div>
        <div class="kpi"><div class="v" style="color:var(--warn)">${dias}</div><div class="l">Dias com registro</div></div>
      </div>
      ${total===0?'<p class="muted" style="text-align:center;margin:8px 0 0">Nenhuma inspeção neste ciclo.</p>':''}
    </div>

    <div class="card">
      <h3>Por tipo de ativo</h3>
      <table><tr><th>Tipo</th><th class="n">Inspeções</th><th class="n">Conf. média</th><th class="n">NC</th></tr>
      ${porTipo.map(t=>`<tr><td>${t.k}</td><td class="n">${t.n}</td><td class="n">${chip(t.media)}</td><td class="n">${t.nc}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">—</td></tr>'}
      </table>
    </div>

    <div class="card">
      <h3>Por área</h3>
      <table><tr><th>Área</th><th class="n">Inspeções</th><th class="n">Conf. média</th><th class="n">NC</th></tr>
      ${porArea.map(t=>`<tr><td>${t.k}</td><td class="n">${t.n}</td><td class="n">${chip(t.media)}</td><td class="n">${t.nc}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">—</td></tr>'}
      </table>
    </div>

    <div class="card">
      <h3>Por colaborador</h3>
      <table><tr><th>Bombeiro</th><th class="n">Inspeções</th><th class="n">Conf. média</th></tr>
      ${porResp.map(t=>`<tr><td>${t.k}</td><td class="n">${t.n}</td><td class="n">${chip(t.media)}</td></tr>`).join('')||'<tr><td colspan="3" class="muted">—</td></tr>'}
      </table>
    </div>

    <button class="btn" onclick="gerarPDF()">⬇ Baixar PDF da medição</button>
    <p class="muted" style="text-align:center;margin-top:10px">PDF gerado no próprio aparelho, pronto para anexar na medição.</p>
  `;
}

function muda(d){ offset+=d; if(offset>0) offset=0; carregar(); }

/* ---------- PDF (mesmo motor do DSS: jsPDF) ---------- */
function gerarPDF(){
  const {jsPDF}=window.jspdf;
  const {ini,fim,ins,efN}=DADOS;
  const total=ins.length;
  const conf=ins.filter(r=>r.condicao==='conforme').length;
  const media= total? (ins.reduce((a,r)=>a+(r.conformidade_pct||0),0)/total).toFixed(1):'0';
  const ncs=total-conf;
  const dias=new Set(ins.map(r=>(r.created_at||'').slice(0,10))).size;
  const porTipo=agrupa(ins, r=>_tipo[r.tipo]||r.tipo);
  const porArea=agrupa(ins, r=>r.area);
  const porResp=agrupa(ins, r=>efN[r.responsavel_id]);

  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210, M=14, CW=W-2*M; let y=0;
  // cabeçalho
  doc.setFillColor(10,34,64); doc.rect(0,0,W,24,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(15);
  doc.text('Relatório de Medição',M,12);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(174,190,212);
  doc.text('Bombeiros · SPCI — Terminal Parauapebas / Vale',M,18);
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text(fmtCurto(ini)+' a '+fmtCurto(fim),W-M,12,{align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(174,190,212);
  doc.text('Emitido em '+fmt(new Date()),W-M,18,{align:'right'});
  y=32;

  doc.setTextColor(40,55,75); doc.setFontSize(10);
  doc.text('Período de medição: '+fmt(ini)+'  a  '+fmt(fim),M,y); y+=8;
  doc.setDrawColor(223,229,236); doc.line(M,y,W-M,y); y+=8;

  // KPIs
  function kpi(x,val,lbl){ doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(10,34,64);doc.text(String(val),x,y);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(98,116,138);doc.text(lbl,x,y+5); }
  kpi(M,total,'Inspeções'); kpi(M+48,media+'%','Conformidade'); kpi(M+96,ncs,'Não conformes'); kpi(M+140,dias,'Dias c/ registro');
  y+=14; doc.setDrawColor(223,229,236); doc.line(M,y,W-M,y); y+=8;

  function tabela(titulo, linhas, cols){
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(10,34,64);
    doc.text(titulo,M,y); y+=6;
    doc.setFontSize(9); doc.setFillColor(238,242,246); doc.rect(M,y-4,CW,7,'F');
    doc.setTextColor(98,116,138);
    cols.forEach(c=>doc.text(c.t,c.x,y)); y+=5;
    doc.setFont('helvetica','normal'); doc.setTextColor(40,55,75);
    linhas.forEach(r=>{
      if(y>278){ doc.addPage(); y=20; }
      cols.forEach(c=>doc.text(String(c.v(r)),c.x,y,c.align?{align:c.align}:undefined));
      y+=6; doc.setDrawColor(238,242,246); doc.line(M,y-4.5,W-M,y-4.5);
    });
    y+=5;
  }
  tabela('Por tipo de ativo', porTipo, [
    {t:'Tipo',x:M,v:r=>r.k},
    {t:'Inspeções',x:M+90,v:r=>r.n},
    {t:'Conf. média',x:M+125,v:r=>r.media+'%'},
    {t:'NC',x:W-M,align:'right',v:r=>r.nc}
  ]);
  tabela('Por área', porArea, [
    {t:'Área',x:M,v:r=>r.k},
    {t:'Inspeções',x:M+90,v:r=>r.n},
    {t:'Conf. média',x:M+125,v:r=>r.media+'%'},
    {t:'NC',x:W-M,align:'right',v:r=>r.nc}
  ]);
  tabela('Por colaborador', porResp, [
    {t:'Bombeiro',x:M,v:r=>r.k},
    {t:'Inspeções',x:M+110,v:r=>r.n},
    {t:'Conf. média',x:W-M,align:'right',v:r=>r.media+'%'}
  ]);

  // rodapé
  const pgs=doc.internal.getNumberOfPages();
  for(let i=1;i<=pgs;i++){ doc.setPage(i); doc.setFontSize(8); doc.setTextColor(150,160,175);
    doc.text('SGO-ETP · Relatório de Medição · gerado automaticamente',M,290);
    doc.text(i+'/'+pgs,W-M,290,{align:'right'}); }

  doc.save('Medicao_'+fmtCurto(ini).replace('/','-')+'_a_'+fmtCurto(fim).replace('/','-')+'.pdf');
}

start();
</script>
</body>
</html>
